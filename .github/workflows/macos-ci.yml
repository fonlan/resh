name: macOS CI

on:
  pull_request:
  push:
    branches:
      - main
  # Tag push release is owned solely by the cross-platform release workflow.
  # This workflow no longer runs on tags (avoids duplicate signed macOS jobs).
  workflow_dispatch:
    inputs:
      release_artifacts:
        description: Optional manual signed/notarized macOS build (not GitHub Release)
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  macos-automated:
    name: macOS automated checks (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-15
          - macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend production build
        run: npm run build

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Ensure PowerShell entry runtime
        run: |
          if ! command -v pwsh >/dev/null 2>&1; then
            brew install --cask powershell
          fi

      - name: Validate SFTP performance script entry
        run: npm run sftp:perf-suite:check

      - name: Verify GitHub Actions pinning
        run: npm run ci:pin-actions

      - name: Build macOS app bundle
        run: npm run tauri-build -- --config src-tauri/tauri.macos.conf.json --bundles app

      - name: Launch and window smoke test
        run: npm run smoke:macos -- --skip-build

  macos-release-artifacts:
    name: Signed macOS release artifacts (${{ matrix.target }})
    # Manual signed build only; automatic tag release is a separate workflow.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.release_artifacts }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-release-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-release-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Prepare App Store Connect API key
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          test -n "$APPLE_API_KEY"
          test -n "$APPLE_API_KEY_P8_BASE64"
          install -m 700 -d "$RUNNER_TEMP/apple-notary"
          export APPLE_API_KEY_PATH="$RUNNER_TEMP/apple-notary/AuthKey_${APPLE_API_KEY}.p8"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"
          node -e "require('fs').writeFileSync(process.env.APPLE_API_KEY_PATH, Buffer.from(process.env.APPLE_API_KEY_P8_BASE64, 'base64'))"

      - name: Build signed and notarized bundle
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npm run macos:release -- --target ${{ matrix.target }}

      - name: Verify notarized artifacts and checksums
        run: npm run macos:verify -- --target ${{ matrix.target }} --out-dir artifacts/macos/${{ matrix.target }}

      - name: Upload signed macOS artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: resh-macos-${{ matrix.target }}
          path: artifacts/macos/${{ matrix.target }}
          if-no-files-found: error
