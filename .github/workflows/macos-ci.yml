name: macOS CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  macos-automated:
    name: macOS automated checks (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - macos-15
          - macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend production build
        run: npm run build

      - name: Rust unit tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

      - name: Ensure PowerShell entry runtime
        run: |
          if ! command -v pwsh >/dev/null 2>&1; then
            brew install --cask powershell
          fi

      - name: Validate SFTP performance script entry
        run: npm run sftp:perf-suite:check

      - name: Build macOS app bundle
        run: npm run tauri-build -- --config src-tauri/tauri.macos.conf.json --bundles app

      - name: Launch and window smoke test
        run: npm run smoke:macos -- --skip-build
